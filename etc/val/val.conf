# Configuración de val (Versatile Autoregistration Listener)
# Sobreescrituras: /etc/val/val.conf.d/*.conf
# Referencia exhaustiva: /usr/share/val/val.conf.defaults
# Puedes copiar ese archivo, las variables a configurar son las mismas que en este ejemplo 
# pero con comentarios explicativos más detallados.

# Fuente de datos del inventario: vas | vac
SOURCE=vas

# IP o hostname del servidor VAS (sin scheme; usa VAS_SCHEME para http/https)
# Solo con SOURCE=vas
VAS_HOST=127.0.0.1

# Esquema de conexión: http (default) | https
# VAS_SCHEME=http

# Directorio de estado de VAC (solo con SOURCE=vac)
VAC_STATE_DIR=/var/lib/vac

# Filtro de clientes: active | inactive | archived | all
FILTER=active

# Segundos entre comprobaciones de versión
CHECK_SECONDS=300

# Segundos de espera ante errores de conexión
RETRY_SECONDS=60

# Directorio con los scripts hook (ejecutables, orden lexical)
HOOKS_DIR=/etc/val/hooks.d

# Filtro global de clave extra enviado a VAS (vacío = inventario completo)
GLOBAL_KEY=

# Claves a materializar como ficheros locales (separadas por espacios)
LOCAL_KEY_LIST=

# Envío del inventario por stdin a los hooks
DISPATCH_STDIN=true

# Puerto UDP de escucha para notificaciones push de VAS (0 = desactivado)
BUMP_LISTEN_PORT=0

# Timeout por hook en dispatch_hooks en segundos (0 = sin límite)
HOOK_TIMEOUT_SECONDS=30

# Nivel de log: no | normal | debug
LOG_LEVEL=normal

# Log adicional a fichero con timestamp UTC (vacío = solo stdout/journald)
# LOG_FILE=/var/log/val/val.log

# Modo de paralelización:
#   both          → bucle principal + sub-instancias (default)
#   only_parallel → solo sub-instancias (exec val-sub-manager)
#   only_main     → solo bucle principal, sin sub-instancias
# Sub-instancias detectadas por /etc/val/val.sub/*/val.conf + .enabled
PARALLEL_MODE=both

# Transformación VAT del inventario (requiere versatile-autoreg-vat)
# USE_VAT=false
# VAT_PRESET=
