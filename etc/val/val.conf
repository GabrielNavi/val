# Configuración de val (Versatile Autoregistration Listener)
# Modifica este fichero para ajustar el comportamiento sin reinstalar el paquete.
# Añade sobreescrituras en /etc/val/val.conf.d/*.conf
# (se aplican en orden lexical, después de este archivo).

# Fuente de datos del inventario:
#   vas  → consulta VAS directamente via HTTP (recomendado)
#   vac  → lee la copia local descargada por VAC (/var/lib/vac/clients.json)
SOURCE=vas

# URL del servidor VAS (solo con SOURCE=vas)
VAS_HOST="http://127.0.0.1:8000"

# Filtro de clientes distribuidos a los hooks:
#   active    → solo clientes activos       (compatible con SOURCE=vas y SOURCE=vac)
#   inactive  → solo clientes inactivos     (requiere SOURCE=vas)
#   archived  → solo clientes archivados    (requiere SOURCE=vas)
#   all       → todos los clientes          (requiere SOURCE=vas)
FILTER=active

# Segundos entre comprobaciones de versión
CHECK_SECONDS=300

# Segundos de espera ante errores de conexión o hooks fallidos
RETRY_SECONDS=60

# Directorio con los scripts hook.
# Los scripts deben ser ejecutables. Se invocan en orden lexical.
# Cada hook recibe el inventario JSON por stdin y las variables:
#   VAL_VERSION, VAL_FILTER, VAL_SOURCE
HOOKS_DIR=/etc/val/hooks.d

# Directorio de estado de VAC (solo con SOURCE=vac)
VAC_STATE_DIR=/var/lib/vac

# Filtro global de clave extra enviado a VAS: solo descarga clientes que
# tengan esta clave en extra_imperative o extra_informative.
# Vacío = sin filtro (inventario completo). Solo aplica con SOURCE=vas.
# Útil para agrupar equipos por rol/aula usando una key "dummy" en VAC.
GLOBAL_KEY=

# Lista de claves a materializar como ficheros locales tras cada descarga.
# VAL escribe STATE_DIR/KEY_clients.json por cada clave, con los clientes
# que tienen esa clave en extra_imperative o extra_informative.
# Vacío = sin materialización. Las claves se separan por espacios.
# Práctica recomendada: los hooks leen VAL_STATE_DIR/KEY_clients.json
# en lugar de procesar el inventario completo por stdin.
LOCAL_KEY_LIST=

# Envío del inventario por stdin a los hooks.
# true  = comportamiento actual (compatible con hooks existentes).
# false = hooks no reciben stdin; deben leer VAL_STATE_DIR/KEY_clients.json.
# Práctica recomendada para hooks nuevos: DISPATCH_STDIN=false.
DISPATCH_STDIN=true

# Puerto UDP de escucha para notificaciones push de VAS (VAL-Aware).
# 0 = desactivado (comportamiento por defecto: solo polling periódico).
# Con un valor distinto de 0, VAL escucha en ese puerto UDP y cuando recibe
# cualquier datagrama interrumpe el sleep del ciclo y consulta /version
# inmediatamente. Requiere el hook val-local en /etc/vas/hooks.d/ de VAS.
# Ejemplo: BUMP_LISTEN_PORT=9876
BUMP_LISTEN_PORT=0

# Timeout en segundos para cada hook en dispatch_hooks().
# Un hook que supere este límite se cancela y se registra como error.
# 0 = sin límite (no recomendado: un hook colgado bloquea VAL indefinidamente).
HOOK_TIMEOUT_SECONDS=30

# Paralelización: lanza val-sub-manager al arrancar VAL.
# Permite gestionar múltiples sub-instancias de VAL, cada una con su propio
# SOURCE/VAS_HOST, hooks y estado, definidas en /etc/val/val.sub/*/val.conf.
# true  → val arranca val-sub-manager en background al iniciar
# false → sin sub-instancias (por defecto)
# Gestión de sub-instancias: val-sub-instance --create NAME --vas URL
PARALLELIZATION=false

# Transformación VAT del inventario. Requiere paquete vx-dga-l-vat instalado.
# Se aplica en dos puntos con direcciones distintas:
#   upstream   → clients.json recién descargado de VAS/VAC, antes de materializar.
#                El preset puede filtrar o redactar lo que llega desde la fuente.
#   downstream → cada KEY_clients.json tras materialize_keys, antes de que los
#                hooks lo lean. El preset puede adaptar cada vista por clave.
# Ambos puntos usan el mismo VAT_PRESET; la dirección selecciona qué reglas
# del preset se aplican en cada caso (match.direction en el YAML).
# USE_VAT=false
# VAT_PRESET=
