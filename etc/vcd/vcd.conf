# Configuración de vcd (Vitalinux Consumer Daemon)
# Modifica este fichero para ajustar el comportamiento sin reinstalar el paquete.
# Añade sobreescrituras en /etc/vcd/vcd.conf.d/*.conf
# (se aplican en orden lexical, después de este archivo).

# Fuente de datos del inventario:
#   vas  → consulta VAS directamente via HTTP (recomendado)
#   vac  → lee la copia local descargada por VAC (/var/lib/vac/clients.json)
SOURCE=vas

# URL del servidor VAS (solo con SOURCE=vas)
VAS_HOST="http://127.0.0.1:8000"

# Filtro de clientes distribuidos a los hooks:
#   active    → solo clientes activos       (compatible con SOURCE=vas y SOURCE=vac)
#   inactive  → solo clientes inactivos     (requiere SOURCE=vas)
#   all       → todos los clientes          (requiere SOURCE=vas)
FILTER=active

# Segundos entre comprobaciones de versión
CHECK_SECONDS=300

# Segundos de espera ante errores de conexión o hooks fallidos
RETRY_SECONDS=60

# Directorio con los scripts hook.
# Los scripts deben ser ejecutables. Se invocan en orden lexical.
# Cada hook recibe el inventario JSON por stdin y las variables:
#   VCD_VERSION, VCD_FILTER, VCD_SOURCE
HOOKS_DIR=/etc/vcd/hooks.d

# Directorio de estado de VAC (solo con SOURCE=vac)
VAC_STATE_DIR=/var/lib/vac
