# Sub-instancia VAL — plantilla de configuración
# Hereda /etc/val/val.conf; define aquí solo lo que difiere.
# Sobreescrituras: val.conf.d/*.conf
# Referencia completa: /usr/share/val/val.conf.defaults

# Fuente del inventario: vas | vac
SOURCE=vas

# IP o hostname del servidor VAS (sin scheme; solo con SOURCE=vas)
VAS_HOST=

# Esquema de conexión: http (default) | https
# VAS_SCHEME=http
